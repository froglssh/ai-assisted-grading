<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI輔助教學_實驗探究</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --text:#1c2330; --sub:#5a6373;
    --accent:#2f6fed; --accent-soft:#e7f0ff; --border:#e1e4ea;
    --shadow:0 6px 24px rgba(20,30,50,.10);
    --imgbg:#eceef2;
  }
  body.dark{
    --bg:#0e1116; --panel:#161a22; --text:#eef1f6; --sub:#a8b0be;
    --accent:#5b9bff; --accent-soft:#1c2740; --border:#2a3140;
    --shadow:0 6px 28px rgba(0,0,0,.55);
    --imgbg:#000000;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; flex-direction:column; min-height:100vh;
    transition:background .3s,color .3s;
  }
  /* ---------- Header ---------- */
  header{
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:14px 26px; display:flex; align-items:center; gap:18px;
    flex-wrap:wrap; box-shadow:var(--shadow); z-index:5;
  }
  .title-block h1{font-size:1.5rem; letter-spacing:.5px;}
  .title-block .author{font-size:.9rem; color:var(--sub); margin-top:2px;}
  .controls{margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  button.ctrl, .seconds-box{
    background:var(--accent-soft); color:var(--accent);
    border:1px solid var(--border); border-radius:10px;
    padding:9px 14px; font-size:.95rem; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; font-weight:600;
    transition:all .2s; white-space:nowrap;
  }
  button.ctrl:hover{background:var(--accent); color:#fff;}
  .seconds-box{cursor:default;}
  .seconds-box input{
    width:54px; text-align:center; border:none; border-radius:6px;
    padding:4px; font-size:.95rem; font-weight:700;
    background:var(--panel); color:var(--text);
  }
  /* ---------- Main split ---------- */
  main{flex:1; display:flex; gap:0; min-height:0;}
  .left{
    flex:2; background:var(--imgbg); display:flex; align-items:center;
    justify-content:center; padding:24px; min-width:0; position:relative;
    transition:background .3s;
  }
  .left img{max-width:100%; max-height:100%; object-fit:contain;
    border-radius:8px; box-shadow:var(--shadow);}
  .right{
    flex:1; background:var(--panel); border-left:1px solid var(--border);
    padding:30px 32px; overflow-y:auto; display:flex; flex-direction:column;
    transition:background .3s;
  }
  .slide-tag{
    color:var(--accent); font-weight:700; font-size:1rem; letter-spacing:1px;
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .slide-tag .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .speech{font-size:1.32rem; line-height:2.15; letter-spacing:.3px;
    text-align:justify; color:var(--text);}
  /* ---------- Footer nav ---------- */
  footer{
    background:var(--panel); border-top:1px solid var(--border);
    padding:12px 26px; display:flex; align-items:center; gap:16px;
    box-shadow:0 -4px 18px rgba(20,30,50,.06); z-index:5;
  }
  .nav-btn{
    background:var(--accent-soft); color:var(--accent); border:1px solid var(--border);
    border-radius:50%; width:46px; height:46px; font-size:1.3rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .2s;
  }
  .nav-btn:hover{background:var(--accent); color:#fff;}
  .nav-btn:disabled{opacity:.35; cursor:not-allowed;}
  .progress-wrap{flex:1; display:flex; flex-direction:column; gap:6px;}
  .counter{font-size:.9rem; color:var(--sub); font-weight:600;}
  .slider{
    -webkit-appearance:none; appearance:none; width:100%; height:8px;
    border-radius:5px; background:var(--border); outline:none; cursor:pointer;
  }
  .slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:20px; height:20px;
    border-radius:50%; background:var(--accent); border:3px solid var(--panel);
    box-shadow:0 1px 5px rgba(0,0,0,.35); cursor:pointer; transition:transform .15s;
  }
  .slider::-webkit-slider-thumb:hover{transform:scale(1.2);}
  .slider::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%; background:var(--accent);
    border:3px solid var(--panel); box-shadow:0 1px 5px rgba(0,0,0,.35); cursor:pointer;
  }
  /* ---------- Fullscreen player ---------- */
  #player{
    position:fixed; inset:0; background:#000; display:none;
    align-items:center; justify-content:center; z-index:50;
  }
  #player.active{display:flex;}
  #player img{max-width:100vw; max-height:100vh; object-fit:contain;}
  .player-bar{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; gap:16px; padding:12px 22px;
    background:linear-gradient(transparent,rgba(0,0,0,.7)); color:#fff;
    opacity:0; transition:opacity .3s;
  }
  #player:hover .player-bar{opacity:1;}
  .player-bar button{
    background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3);
    border-radius:8px; padding:8px 14px; cursor:pointer; font-size:.95rem; font-weight:600;
  }
  .player-bar button:hover{background:rgba(255,255,255,.32);}
  .player-bar .pcount{margin-left:auto; font-size:.95rem;}
  @media (max-width:820px){
    main{flex-direction:column;}
    .left,.right{flex:none;}
    .left{height:46vh;} .speech{font-size:1.12rem; line-height:1.95;}
  }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>AI輔助教學_實驗探究</h1>
    <div class="author">臺北市立麗山高中　林獻升老師</div>
  </div>
  <div class="controls">
    <button class="ctrl" id="homeBtn">⌂ 回到首頁</button>
    <div class="seconds-box" title="自動播放每頁秒數">
      ⏱ 每頁
      <input id="seconds" type="number" min="1" max="120" value="6"> 秒
    </div>
    <button class="ctrl" id="autoBtn">▶ 自動播放</button>
    <button class="ctrl" id="playBtn">⛶ 全螢幕播放</button>
    <button class="ctrl" id="themeBtn">🌓 切換背景</button>
  </div>
</header>

<main>
  <div class="left"><img id="slideImg" src="" alt="簡報畫面"></div>
  <div class="right">
    <div class="slide-tag"><span class="dot"></span><span id="slideTag">第 1 頁</span></div>
    <div class="speech" id="speech"></div>
  </div>
</main>

<footer>
  <button class="nav-btn" id="prevBtn">‹</button>
  <div class="progress-wrap">
    <div class="counter">快速跳頁　<span id="counter">1 / 34</span></div>
    <input type="range" id="slider" class="slider" min="1" max="34" value="1" step="1">
  </div>
  <button class="nav-btn" id="nextBtn">›</button>
</footer>

<!-- Fullscreen player -->
<div id="player">
  <img id="playerImg" src="" alt="">
  <div class="player-bar">
    <button id="pPrev">‹ 上一頁</button>
    <button id="pToggle">⏸ 暫停</button>
    <button id="pNext">下一頁 ›</button>
    <span class="pcount" id="pCount">1 / 34</span>
    <button id="pExit">✕ 結束播放</button>
  </div>
</div>

<script src="AI輔助教學_實驗探究.data.js"></script>
<script>
  let idx = 0, autoTimer = null, autoOn = false, playerOn = false, playerPaused = false;
  const $ = id => document.getElementById(id);

  function getSeconds(){ let s = parseInt($('seconds').value)||6; if(s<1)s=1; return s*1000; }

  function render(){
    const s = SLIDES[idx];
    $('slideImg').src = s.img;
    $('speech').textContent = s.text;
    $('slideTag').textContent = '第 ' + (idx+1) + ' 頁';
    $('counter').textContent = (idx+1) + ' / ' + SLIDES.length;
    $('slider').value = idx+1;
    $('prevBtn').disabled = idx===0;
    $('nextBtn').disabled = idx===SLIDES.length-1;
    if(playerOn){ $('playerImg').src = s.img; $('pCount').textContent = (idx+1)+' / '+SLIDES.length; }
  }
  function go(n){ idx = (n+SLIDES.length)%SLIDES.length; render(); }
  function next(){ idx = (idx+1)%SLIDES.length; render(); }
  function prev(){ idx = (idx-1+SLIDES.length)%SLIDES.length; render(); }

  // ---- Auto play (split view) ----
  function startAuto(){
    autoOn = true; $('autoBtn').textContent='⏸ 停止播放';
    clearInterval(autoTimer);
    autoTimer = setInterval(()=>{ if(!playerOn) next(); }, getSeconds());
  }
  function stopAuto(){ autoOn=false; $('autoBtn').textContent='▶ 自動播放'; clearInterval(autoTimer); }
  $('autoBtn').onclick = ()=> autoOn ? stopAuto() : startAuto();

  // ---- Fullscreen player ----
  function openPlayer(){
    playerOn=true; playerPaused=false; $('player').classList.add('active');
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    render(); startPlayerTimer(); $('pToggle').textContent='⏸ 暫停';
  }
  function closePlayer(){
    playerOn=false; $('player').classList.remove('active');
    clearInterval(autoTimer);
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    if(autoOn) startAuto();
  }
  function startPlayerTimer(){
    clearInterval(autoTimer);
    autoTimer = setInterval(()=>{ if(playerOn && !playerPaused) next(); }, getSeconds());
  }
  $('playBtn').onclick = openPlayer;
  $('pExit').onclick = closePlayer;
  $('pNext').onclick = ()=>{ next(); };
  $('pPrev').onclick = ()=>{ prev(); };
  $('pToggle').onclick = ()=>{
    playerPaused = !playerPaused;
    $('pToggle').textContent = playerPaused ? '▶ 繼續' : '⏸ 暫停';
  };

  // ---- Theme ----
  $('themeBtn').onclick = ()=> document.body.classList.toggle('dark');

  // ---- Nav ----
  $('nextBtn').onclick = next;
  $('prevBtn').onclick = prev;
  $('homeBtn').onclick = ()=>{ stopAuto(); go(0); };
  $('slider').oninput = ()=>{ go(parseInt($('slider').value)-1); };
  $('seconds').onchange = ()=>{ if(autoOn) startAuto(); if(playerOn) startPlayerTimer(); };

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight') next();
    else if(e.key==='ArrowLeft') prev();
    else if(e.key==='Escape' && playerOn) closePlayer();
    else if(e.key===' '){ e.preventDefault();
      if(playerOn){ $('pToggle').click(); } else { autoOn?stopAuto():startAuto(); } }
  });
  document.addEventListener('fullscreenchange', ()=>{
    if(!document.fullscreenElement && playerOn) closePlayer();
  });

  render();
</script>
</body>
</html>
